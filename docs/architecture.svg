<svg width="100%" viewBox="0 0 680 720" xmlns="http://www.w3.org/2000/svg" role="img"><title>AI Job Application Agent — System Architecture</title><desc>Five-tier architecture: external sources, ingestion, core services, storage, and UI.</desc>
<style>
  .t { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 14px; fill: #2C2C2A; }
  .ts { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 12px; fill: #5F5E5A; }
  .th { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 14px; font-weight: 500; fill: #2C2C2A; }
  .arr { stroke: #5F5E5A; stroke-width: 1.5; fill: none; }
  .gray { fill: #F1EFE8; stroke: #5F5E5A; }
  .gray-text { fill: #2C2C2A; }
  .gray-text-sub { fill: #5F5E5A; }
  .teal { fill: #E1F5EE; stroke: #0F6E56; }
  .teal-text { fill: #085041; }
  .teal-text-sub { fill: #0F6E56; }
  .purple { fill: #EEEDFE; stroke: #534AB7; }
  .purple-text { fill: #3C3489; }
  .purple-text-sub { fill: #534AB7; }
  .coral { fill: #FAECE7; stroke: #993C1D; }
  .coral-text { fill: #712B13; }
  .coral-text-sub { fill: #993C1D; }
  .blue { fill: #E6F1FB; stroke: #185FA5; }
  .blue-text { fill: #0C447C; }
  .blue-text-sub { fill: #185FA5; }
  .amber { fill: #FAEEDA; stroke: #854F0B; }
  .amber-text { fill: #633806; }
  .amber-text-sub { fill: #854F0B; }
</style>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<text class="th" x="40" y="32">External sources</text>
<rect x="40" y="44" width="140" height="48" rx="8" stroke-width="0.5" class="gray"/>
<text class="th gray-text" x="110" y="64" text-anchor="middle" dominant-baseline="central">Job boards</text>
<text class="ts gray-text-sub" x="110" y="80" text-anchor="middle" dominant-baseline="central">RemoteOK, WWR, etc</text>
<rect x="195" y="44" width="140" height="48" rx="8" stroke-width="0.5" class="gray"/>
<text class="th gray-text" x="265" y="64" text-anchor="middle" dominant-baseline="central">Gmail</text>
<text class="ts gray-text-sub" x="265" y="80" text-anchor="middle" dominant-baseline="central">OAuth, read-only</text>
<rect x="350" y="44" width="140" height="48" rx="8" stroke-width="0.5" class="gray"/>
<text class="th gray-text" x="420" y="64" text-anchor="middle" dominant-baseline="central">LinkedIn export</text>
<text class="ts gray-text-sub" x="420" y="80" text-anchor="middle" dominant-baseline="central">Network graph</text>
<rect x="505" y="44" width="135" height="48" rx="8" stroke-width="0.5" class="gray"/>
<text class="th gray-text" x="572" y="64" text-anchor="middle" dominant-baseline="central">ATS APIs</text>
<text class="ts gray-text-sub" x="572" y="80" text-anchor="middle" dominant-baseline="central">Greenhouse, Lever</text>

<text class="th" x="40" y="130">Ingestion</text>
<rect x="40" y="142" width="295" height="48" rx="8" stroke-width="0.5" class="teal"/>
<text class="th teal-text" x="187" y="162" text-anchor="middle" dominant-baseline="central">Discovery service</text>
<text class="ts teal-text-sub" x="187" y="178" text-anchor="middle" dominant-baseline="central">Crawlers, dedup, salary normalizer</text>
<rect x="350" y="142" width="290" height="48" rx="8" stroke-width="0.5" class="teal"/>
<text class="th teal-text" x="495" y="162" text-anchor="middle" dominant-baseline="central">Tracker service</text>
<text class="ts teal-text-sub" x="495" y="178" text-anchor="middle" dominant-baseline="central">Email classifier, state transitions</text>

<line x1="110" y1="92" x2="110" y2="138" class="arr" marker-end="url(#arrow)"/>
<line x1="265" y1="92" x2="495" y2="138" class="arr" marker-end="url(#arrow)"/>
<line x1="420" y1="92" x2="420" y2="222" class="arr" marker-end="url(#arrow)" stroke-dasharray="4 3"/>

<rect x="40" y="220" width="600" height="34" rx="6" fill="none" stroke="#5F5E5A" stroke-width="0.5" stroke-dasharray="6 4"/>
<text class="ts" x="60" y="241" dominant-baseline="central">Kafka — jobs.discovered, applications.events, email.events</text>

<line x1="187" y1="190" x2="187" y2="218" class="arr" marker-end="url(#arrow)"/>
<line x1="495" y1="190" x2="495" y2="218" class="arr" marker-end="url(#arrow)"/>

<text class="th" x="40" y="284">Core services</text>
<rect x="40" y="296" width="140" height="56" rx="8" stroke-width="0.5" class="purple"/>
<text class="th purple-text" x="110" y="316" text-anchor="middle" dominant-baseline="central">Profile service</text>
<text class="ts purple-text-sub" x="110" y="334" text-anchor="middle" dominant-baseline="central">Resume, story bank</text>
<rect x="195" y="296" width="140" height="56" rx="8" stroke-width="0.5" class="purple"/>
<text class="th purple-text" x="265" y="316" text-anchor="middle" dominant-baseline="central">Matcher service</text>
<text class="ts purple-text-sub" x="265" y="334" text-anchor="middle" dominant-baseline="central">Fit scoring</text>
<rect x="350" y="296" width="140" height="56" rx="8" stroke-width="0.5" class="purple"/>
<text class="th purple-text" x="420" y="316" text-anchor="middle" dominant-baseline="central">Network service</text>
<text class="ts purple-text-sub" x="420" y="334" text-anchor="middle" dominant-baseline="central">Referral paths</text>
<rect x="505" y="296" width="135" height="56" rx="8" stroke-width="0.5" class="coral"/>
<text class="th coral-text" x="572" y="316" text-anchor="middle" dominant-baseline="central">Apply service</text>
<text class="ts coral-text-sub" x="572" y="334" text-anchor="middle" dominant-baseline="central">LLM, Playwright</text>

<rect x="195" y="376" width="295" height="48" rx="8" stroke-width="0.5" class="purple"/>
<text class="th purple-text" x="342" y="396" text-anchor="middle" dominant-baseline="central">Analytics service</text>
<text class="ts purple-text-sub" x="342" y="412" text-anchor="middle" dominant-baseline="central">Funnel rollups, conversion stats</text>

<line x1="110" y1="254" x2="110" y2="294" class="arr" marker-end="url(#arrow)"/>
<line x1="265" y1="254" x2="265" y2="294" class="arr" marker-end="url(#arrow)"/>
<line x1="420" y1="254" x2="420" y2="294" class="arr" marker-end="url(#arrow)"/>
<line x1="572" y1="254" x2="572" y2="294" class="arr" marker-end="url(#arrow)"/>
<line x1="342" y1="254" x2="342" y2="374" class="arr" marker-end="url(#arrow)" stroke-dasharray="4 3"/>

<line x1="572" y1="352" x2="572" y2="80" class="arr" marker-end="url(#arrow)"/>

<text class="th" x="40" y="456">Storage</text>
<rect x="40" y="468" width="140" height="48" rx="8" stroke-width="0.5" class="blue"/>
<text class="th blue-text" x="110" y="488" text-anchor="middle" dominant-baseline="central">Postgres</text>
<text class="ts blue-text-sub" x="110" y="504" text-anchor="middle" dominant-baseline="central">Transactional</text>
<rect x="195" y="468" width="140" height="48" rx="8" stroke-width="0.5" class="blue"/>
<text class="th blue-text" x="265" y="488" text-anchor="middle" dominant-baseline="central">pgvector</text>
<text class="ts blue-text-sub" x="265" y="504" text-anchor="middle" dominant-baseline="central">Embeddings, edits</text>
<rect x="350" y="468" width="140" height="48" rx="8" stroke-width="0.5" class="blue"/>
<text class="th blue-text" x="420" y="488" text-anchor="middle" dominant-baseline="central">Redis</text>
<text class="ts blue-text-sub" x="420" y="504" text-anchor="middle" dominant-baseline="central">Dedup, throttling</text>
<rect x="505" y="468" width="135" height="48" rx="8" stroke-width="0.5" class="blue"/>
<text class="th blue-text" x="572" y="488" text-anchor="middle" dominant-baseline="central">Object store</text>
<text class="ts blue-text-sub" x="572" y="504" text-anchor="middle" dominant-baseline="central">Resumes, screenshots</text>

<line x1="110" y1="352" x2="110" y2="466" class="arr" marker-end="url(#arrow)" stroke-dasharray="4 3"/>
<line x1="265" y1="352" x2="265" y2="466" class="arr" marker-end="url(#arrow)" stroke-dasharray="4 3"/>
<line x1="572" y1="424" x2="572" y2="466" class="arr" marker-end="url(#arrow)" stroke-dasharray="4 3"/>

<text class="th" x="40" y="556">UI</text>
<rect x="40" y="568" width="295" height="56" rx="8" stroke-width="0.5" class="amber"/>
<text class="th amber-text" x="187" y="588" text-anchor="middle" dominant-baseline="central">API gateway</text>
<text class="ts amber-text-sub" x="187" y="606" text-anchor="middle" dominant-baseline="central">REST or GraphQL, JWT</text>
<rect x="350" y="568" width="290" height="56" rx="8" stroke-width="0.5" class="amber"/>
<text class="th amber-text" x="495" y="588" text-anchor="middle" dominant-baseline="central">Next.js frontend</text>
<text class="ts amber-text-sub" x="495" y="606" text-anchor="middle" dominant-baseline="central">Dashboard, pipeline, analytics</text>

<line x1="187" y1="516" x2="187" y2="566" class="arr" marker-end="url(#arrow)"/>
<line x1="335" y1="596" x2="348" y2="596" class="arr" marker-end="url(#arrow)"/>

<rect x="40" y="650" width="600" height="50" rx="8" fill="none" stroke="#5F5E5A" stroke-width="0.5" stroke-dasharray="6 4"/>
<text class="ts" x="60" y="668" dominant-baseline="central">Legend: solid arrow = sync call or event flow.  Dashed arrow = read or write to storage.</text>
<text class="ts" x="60" y="686" dominant-baseline="central">Color: gray = external, teal = ingestion, purple = core, coral = automation, blue = storage, amber = UI.</text>
</svg>
