spring:
  application:
    name: discovery-service

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/jobagent}
    username: ${DATABASE_USER:jobagent}
    password: ${DATABASE_PASSWORD:jobagent}
    driver-class-name: org.postgresql.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8082

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

anthropic:
  api-key: ${ANTHROPIC_API_KEY}
  base-url: https://api.anthropic.com
  model: claude-haiku-4-5-20251001
  max-tokens: 256
  timeout-seconds: 30

discovery:
  remoteok:
    enabled: true
    api-url: https://remoteok.com/api
    # cron: every 6 hours
    cron: "0 0 */6 * * *"
    user-agent: "JobAgent/1.0 (contact: srshubham77@gmail.com)"
  salary:
    llm-classify-ambiguous: true
  max-jobs-per-run: 500
