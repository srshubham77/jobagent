spring:
  application:
    name: profile-service

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/jobagent}
    username: ${DATABASE_USER:jobagent}
    password: ${DATABASE_PASSWORD:jobagent}
    driver-class-name: org.postgresql.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: public

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

server:
  port: 8081

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

anthropic:
  api-key: ${ANTHROPIC_API_KEY}
  base-url: https://api.anthropic.com
  model: claude-sonnet-4-6
  max-tokens: 4096
  timeout-seconds: 60
