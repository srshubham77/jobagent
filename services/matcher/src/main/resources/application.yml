spring:
  application:
    name: matcher-service

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/jobagent}
    username: ${DATABASE_USER:jobagent}
    password: ${DATABASE_PASSWORD:jobagent}
    driver-class-name: org.postgresql.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8083

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

anthropic:
  api-key: ${ANTHROPIC_API_KEY}
  base-url: https://api.anthropic.com
  model: claude-haiku-4-5-20251001
  max-tokens: 512
  timeout-seconds: 30

matcher:
  # Score jobs in batches this large each run
  batch-size: 500
  # Fixed delay between scoring passes (ms)
  scoring-delay-ms: 60000
  # Weights must sum to 1.0
  weights:
    skill-overlap: 0.35
    seniority:     0.25
    salary-fit:    0.25
    recency:       0.15
  # LLM holistic scoring: only called for jobs with preliminary score >= this threshold
  llm-score-threshold: 60
  llm-enabled: false
