services:

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: jobagent
      POSTGRES_PASSWORD: jobagent
      POSTGRES_DB: jobagent
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jobagent"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  # kafka: disabled until Phase 3 (no service depends on it yet)

  # ── Backend Services ──────────────────────────────────────────────────────

  profile:
    build:
      context: services/profile
      dockerfile: Dockerfile
    ports:
      - "8081:8081"
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/jobagent
      DATABASE_USER: jobagent
      DATABASE_PASSWORD: jobagent
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s

  discovery:
    build:
      context: services/discovery
      dockerfile: Dockerfile
    ports:
      - "8082:8082"
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/jobagent
      DATABASE_USER: jobagent
      DATABASE_PASSWORD: jobagent
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8082/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s

  matcher:
    build:
      context: services/matcher
      dockerfile: Dockerfile
    ports:
      - "8083:8083"
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/jobagent
      DATABASE_USER: jobagent
      DATABASE_PASSWORD: jobagent
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8083/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s

  apply:
    build:
      context: services/apply
      dockerfile: Dockerfile
    ports:
      - "8084:8084"
    environment:
      DATABASE_URL: postgresql+asyncpg://jobagent:jobagent@postgres:5432/jobagent
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8084/health')\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  tracker:
    build:
      context: services/tracker
      dockerfile: Dockerfile
    ports:
      - "8085:8085"
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/jobagent
      DATABASE_USER: jobagent
      DATABASE_PASSWORD: jobagent
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      GMAIL_OAUTH_CLIENT_ID: ${GMAIL_OAUTH_CLIENT_ID:-}
      GMAIL_OAUTH_CLIENT_SECRET: ${GMAIL_OAUTH_CLIENT_SECRET:-}
      GMAIL_OAUTH_REDIRECT_URI: ${GMAIL_OAUTH_REDIRECT_URI:-http://localhost:8085/tracker/callback}
      TOKEN_ENCRYPTION_KEY: ${TOKEN_ENCRYPTION_KEY:-AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:3000}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8085/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s

  auth:
    build:
      context: services/auth
      dockerfile: Dockerfile
    ports:
      - "8086:8086"
    environment:
      REDIS_URL: redis://redis:6379
      PROFILE_SERVICE_URL: http://profile:8081
      WEB_APP_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
    depends_on:
      redis:
        condition: service_healthy
      profile:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8086/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s

  # ── Frontend ──────────────────────────────────────────────────────────────

  web:
    build:
      context: web
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      PROFILE_SERVICE_URL: http://profile:8081
      DISCOVERY_SERVICE_URL: http://discovery:8082
      MATCHER_SERVICE_URL: http://matcher:8083
      APPLY_SERVICE_URL: http://apply:8084
      TRACKER_SERVICE_URL: http://tracker:8085
      AUTH_SERVICE_URL: http://auth:8086
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
    depends_on:
      profile:
        condition: service_healthy
      matcher:
        condition: service_healthy
      apply:
        condition: service_healthy
      auth:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
